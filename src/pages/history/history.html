<div class="container py-5">
  <div class="row mb-4">
    <div class="col">
      <a href="/dashboard" data-route="/dashboard" class="link-primary text-decoration-none d-inline-block mb-2">&larr; Back to Dashboard</a>
      <h1 class="mb-1">Calculation History</h1>
      <p class="text-muted mb-0">All saved calculations with quick summaries. Select two to compare.</p>
    </div>
  </div>

  <!-- Alert for comparison type mismatch -->
  <div id="typeAlert" class="alert alert-warning mb-3" style="display: none;">
    Please select two calculations from the same calculator.
  </div>

  <!-- Compare button -->
  <div class="mb-3">
    <button id="compareBtn" class="btn btn-primary" disabled>
      <span id="compareBtnText">Compare (0)</span>
    </button>
  </div>

  <div id="historyContainer" class="card shadow-sm border-0">
    <div class="card-body">
      <div class="alert alert-info mb-0">Loading calculation history...</div>
    </div>
  </div>
</div>
