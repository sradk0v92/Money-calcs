<div class="container py-5">
    <div class="row">
        <div class="col">
            <h1 class="mb-2">Dashboard</h1>
            <p class="text-muted mb-5">Welcome to your financial dashboard. Choose a calculator or view your calculation history.</p>
        </div>
    </div>

    <!-- Available Calculators Section -->
    <section class="mb-5">
        <h2 class="mb-4">Available Calculators</h2>
        <div id="calculatorsContainer" class="row g-4 mb-5">
            <div class="text-center text-muted py-4">Loading calculators...</div>
        </div>
    </section>

    <hr class="my-5">

    <!-- Recent Calculations Section -->
    <section class="mb-5">
        <div class="row mb-4">
            <div class="col">
                <h2 class="mb-0">Recent Calculations</h2>
            </div>
            <div class="col-auto">
                <a href="#" class="link-primary text-decoration-none">View All</a>
            </div>
        </div>
        
        <div id="calculationsContainer">
            <div class="alert alert-info">
                <i class="bi bi-info-circle me-2"></i> Loading your calculation history...
            </div>
        </div>
    </section>

    <hr class="my-5">

    <!-- Saved Scenarios Section -->
    <section class="mb-5">
        <div class="row mb-4">
            <div class="col">
                <h2 class="mb-0">Saved Scenarios</h2>
            </div>
            <div class="col-auto">
                <a href="#" class="link-primary text-decoration-none">View All</a>
            </div>
        </div>
        
        <div id="scenariosContainer">
            <div class="alert alert-info">
                <i class="bi bi-info-circle me-2"></i> Loading your saved scenarios...
            </div>
        </div>
    </section>
</div>
