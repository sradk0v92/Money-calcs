<div class="container py-5">
  <!-- Back link -->
  <div class="row mb-4">
    <div class="col">
      <a href="/dashboard" data-route="/dashboard" class="link-primary text-decoration-none d-inline-block mb-2">&larr; Back to Dashboard</a>
      <h1 class="mb-1" id="pageTitle">Saved Comparison</h1>
      <p class="text-muted mb-0" id="comparisonTitle">Previously saved comparison between two calculations.</p>
    </div>
  </div>

  <!-- Error alert -->
  <div id="errorContainer"></div>

  <!-- Comparison content (shown only if both calculations loaded successfully) -->
  <div id="comparisonContent" style="display: none;">
    <!-- Meta cards -->
    <div class="row g-3 mb-4">
      <div class="col-md-6">
        <div class="card border-0 shadow-sm">
          <div class="card-body">
            <h6 class="card-title text-muted mb-1">Calculation A</h6>
            <p class="card-text" id="calc1Title" style="font-weight: bold; margin-bottom: 0.5rem;">—</p>
            <small class="text-muted d-block mb-2" id="calc1Date">—</small>
            <div id="calc1Summary" class="summary-list" style="margin-top: 0.5rem;"></div>
          </div>
        </div>
      </div>
      <div class="col-md-6">
        <div class="card border-0 shadow-sm">
          <div class="card-body">
            <h6 class="card-title text-muted mb-1">Calculation B</h6>
            <p class="card-text" id="calc2Title" style="font-weight: bold; margin-bottom: 0.5rem;">—</p>
            <small class="text-muted d-block mb-2" id="calc2Date">—</small>
            <div id="calc2Summary" class="summary-list" style="margin-top: 0.5rem;"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Inputs table -->
    <div class="card shadow-sm border-0 mb-4">
      <div class="card-header bg-light border-bottom">
        <h6 class="mb-0">Input Parameters</h6>
      </div>
      <div class="card-body">
        <div class="table-responsive">
          <table class="table table-hover mb-0">
            <thead>
              <tr class="border-bottom">
                <th style="font-weight: 600;">Field</th>
                <th style="font-weight: 600;">Calculation A</th>
                <th style="font-weight: 600;">Calculation B</th>
              </tr>
            </thead>
            <tbody id="inputsTableBody">
              <tr>
                <td colspan="3" class="text-center text-muted py-3">Loading inputs...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Summary results cards -->
    <div class="card shadow-sm border-0 mb-4">
      <div class="card-header bg-light border-bottom">
        <h6 class="mb-0">Key Results</h6>
      </div>
      <div class="card-body">
        <div id="resultsContainer" class="row g-3">
          <div class="col text-center text-muted py-3">Loading results...</div>
        </div>
      </div>
    </div>

    <!-- Chart (if applicable) -->
    <div id="chartContainer" class="card shadow-sm border-0 mb-4" style="display: none;">
      <div class="card-header bg-light border-bottom">
        <h6 class="mb-0" id="chartTitle">Comparison Chart</h6>
      </div>
      <div class="card-body">
        <div id="chartWrap" style="height: 350px; position: relative;">
          <canvas id="comparisonChartCanvas"></canvas>
        </div>
      </div>
    </div>

    <!-- Delete comparison button -->
    <div class="row mb-4">
      <div class="col">
        <button id="editComparisonTitleBtn" class="btn btn-outline-primary me-2">
          <span>✏️ Edit Title</span>
        </button>
        <button id="deleteComparisonBtn" class="btn btn-danger">Delete comparison</button>
      </div>
    </div>
  </div>
</div>
