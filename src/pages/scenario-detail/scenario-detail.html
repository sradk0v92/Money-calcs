<div class="container py-5">
    <div class="row mb-5">
        <div class="col">
            <a href="/dashboard" data-route="/dashboard" class="link-primary text-decoration-none mb-3 d-inline-block">
                &larr; Back to Dashboard
            </a>
            <h1 class="mb-2" id="scenarioTitle">Scenario</h1>
            <p class="text-muted" id="scenarioMeta"></p>
        </div>
    </div>

    <div class="row">
        <div class="col-lg-8">
            <div id="scenarioContent">
                <div class="alert alert-info">
                    <i class="bi bi-info-circle me-2"></i> Loading scenario details...
                </div>
            </div>
        </div>
        <div class="col-lg-4">
            <div class="card shadow-sm">
                <div class="card-header bg-light">
                    <h6 class="mb-0">Actions</h6>
                </div>
                <div class="card-body">
                    <button id="editBtn" class="btn btn-primary w-100 mb-2">Edit Name</button>
                    <button id="deleteBtn" class="btn btn-danger w-100 mb-2">Delete</button>
                    <a href="/dashboard" data-route="/dashboard" class="btn btn-outline-secondary w-100">Back to Dashboard</a>
                </div>
            </div>
        </div>
    </div>
</div>
